name: Deploy Gantos to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: gantos
        run: npm ci

      - name: Build
        working-directory: gantos
        run: npm run build

      - name: Publish gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tmpdir="$(mktemp -d)"
          mkdir -p "$tmpdir/"
          cp -R gantos/dist/. "$tmpdir/"
          printf "%s\n" \
            "<!doctype html>" \
            "<html lang=\"en\">" \
            "<head>" \
            "  <meta charset=\"UTF-8\" />" \
            "  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />" \
            "  <meta http-equiv=\"refresh\" content=\"0; url=Gantos/\" />" \
            "  <title>Gantos</title>" \
            "</head>" \
            "<body>" \
            "  <a href=\"Gantos/\">Open Gantos</a>" \
            "</body>" \
            "</html>" > "$tmpdir/index.html"
          git switch --orphan gh-pages
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$tmpdir/." .
          touch .nojekyll
          git add -A
          git commit -m "Deploy Gantos to GitHub Pages"
          git push --force origin gh-pages
